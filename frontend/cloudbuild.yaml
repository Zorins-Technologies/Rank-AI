steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/rank-ai-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/rank-ai-frontend:latest'
      - '.'
    dir: 'frontend'
    timeout: '3600s'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/rank-ai-frontend:$COMMIT_SHA'
    timeout: '1800s'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - 'deploy'
      - '--filename=.'
    dir: '.gke-deploy'

# Alternative simpler approach using gcloud
onFailure:
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'rank-ai-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/rank-ai-frontend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '2'
      - '--allow-unauthenticated'
    dir: 'frontend'

images:
  - 'gcr.io/$PROJECT_ID/rank-ai-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/rank-ai-frontend:latest'

timeout: '7200s'
